<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank you</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#060606;
      color:rgba(255,255,255,.92);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:18px;
      text-align:center;
    }
    .card{
      max-width:520px;
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      padding:22px;
    }
    h1{
      margin:0 0 10px;
      letter-spacing:1px;
      text-transform:uppercase;
    }
    p{
      margin:0;
      color:rgba(255,255,255,.7);
      line-height:1.6;
    }
    a{
      display:inline-block;
      margin-top:16px;
      color:#20c8ff;
      text-decoration:none;
      font-weight:700;
    }
    a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank you</h1>
    <p>Your request has been received.<br/>We may contact you soon.</p>
    <a href="/">Back to form</a>
  </div>
</body>
</html>
