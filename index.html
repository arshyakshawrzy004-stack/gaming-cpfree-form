<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Event Access</title>
  <style>
    :root { --bg:#060606; --border:rgba(255,255,255,.12); --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.7); --accent:#20c8ff; --accent2:#00ffd5; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1200px 600px at 50% 0%, rgba(32,200,255,.12), transparent 60%),radial-gradient(900px 500px at 50% 100%, rgba(0,255,213,.08), transparent 55%),var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:24px 14px}
    .wrap{width:100%;max-width:480px}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:14px;backdrop-filter:blur(10px)}
    .brand{display:flex;gap:10px;align-items:center;font-weight:800;letter-spacing:.6px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block}
    .chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
    .hero{margin-top:18px;padding:18px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:16px}
    h1{margin:10px 0 10px;font-size:42px;line-height:1.02;letter-spacing:1px;text-transform:uppercase}
    .sub{color:var(--muted);line-height:1.5;font-size:14.5px;margin:0 0 16px;white-space:pre-line}
    .form{margin-top:14px;display:flex;flex-direction:column;gap:12px}
    label{font-size:13px;color:var(--muted)}
    input{width:100%;padding:14px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:var(--text);outline:none;font-size:16px}
    input:focus{border-color:rgba(32,200,255,.65);box-shadow:0 0 0 3px rgba(32,200,255,.12)}
    .row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted)}
    .row input{width:auto;margin-top:2px}
    .hp{display:none;}
    .btn{margin-top:6px;border:1px solid rgba(32,200,255,.35);background:linear-gradient(180deg, rgba(32,200,255,.18), rgba(0,0,0,.1));color:var(--accent);padding:14px;border-radius:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;font-size:16px;cursor:pointer;position:relative;overflow:hidden}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn::after{content:"";position:absolute;inset:-2px;background:radial-gradient(300px 140px at 50% 0%, rgba(32,200,255,.35), transparent 60%);pointer-events:none}
    .msg{margin-top:10px;font-size:13px;color:var(--muted);min-height:18px}
    .footer{margin-top:14px;text-align:center;color:rgba(255,255,255,.55);font-size:12px}
    a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="dot"></span>EVENT ACCESS</div>
      <div class="chip">FREE ENTRY</div>
    </div>

    <div class="hero">
      <h1>Bonus Event</h1>
      <p class="sub">برای ثبت درخواست، مشخصاتت رو وارد کن.
بعد از ارسال، تایید میشه.</p>

      <form class="form" id="leadForm">
        <!-- honeypot ضد اسپم -->
        <div class="hp">
          <label>Leave this empty</label>
          <input type="text" name="website" autocomplete="off" />
        </div>

        <div>
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" required />
        </div>

        <div>
          <label for="name">Name *</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />
        </div>

        <label class="row">
          <input type="checkbox" id="consent" required />
          <span>موافقم اطلاعاتم برای تماس ذخیره شود.</span>
        </label>

        <button class="btn" id="submitBtn" type="submit">NEXT STEP</button>
        <div class="msg" id="msg"></div>
      </form>

      <div class="footer">Need help? <a href="thankyou.html">Support</a></div>
    </div>
  </div>

<script>
const form = document.getElementById('leadForm');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  btn.disabled = true;

  const data = new FormData(form);
  const payload = {
    email: (data.get('email') || '').trim(),
    name: (data.get('name') || '').trim(),
    website: (data.get('website') || '').trim()
  };

  try {
    const r = await fetch('/.netlify/functions/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if (!r.ok) throw new Error('Request failed');
    window.location.href = '/thankyou.html';
  } catch (err) {
    msg.textContent = 'Error: please try again.';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
